name: Upload Python Package

on:
  release:
    types: [published]

env:
  PYTHON_VERSION: 3.12
  IMAGE: "ghcr.io/fairmat-nfdi/test-north"

jobs:
  build-docker-image:
    uses: ./.github/workflows/publish_north.yml
    secrets: inherit

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: build-docker-image
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv and set the Python version to ${{ env.PYTHON_VERSION }}
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Overwrite the image tag
        run: |
          IMAGE_TAG=$(grep -oP "${{ env.IMAGE }}:\K[^'\",]+" src/test_north/north_tools/test_jupyter/__init__.py)

          sed -i "s|${{ env.IMAGE }}:${IMAGE_TAG}|${{ env.IMAGE }}:${GITHUB_REF_NAME}|g" \
          src/test_north/north_tools/test_jupyter/__init__.py
      
      - name: build package
        run: |
          uv build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/

